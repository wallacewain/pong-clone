<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Pong">
<link rel="manifest" href="manifest.json">
<title>Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    font-family: 'Courier New', monospace;
    color: #fff;
    flex-direction: column;
    user-select: none;
    overflow: hidden;
  }
  canvas {
    border: 2px solid #fff;
    display: block;
    /* scale to fit viewport while preserving 8:5 aspect ratio */
    width: min(100vw, 160dvh);
    height: auto;
    aspect-ratio: 8 / 5;
    touch-action: none;
  }
  #info {
    margin-top: 12px;
    font-size: 13px;
    color: #888;
    text-align: center;
    padding: 0 8px;
  }
  #info .kb  { display: inline; }
  #info .touch { display: none; }
  @media (pointer: coarse) {
    #info .kb    { display: none; }
    #info .touch { display: inline; }
  }
</style>
</head>
<body>
<canvas id="pong" width="800" height="500"></canvas>
<div id="info">
  <span class="kb">W / S &mdash; Left Paddle &nbsp;&nbsp;|&nbsp;&nbsp; &uarr; / &darr; &mdash; Right Paddle &nbsp;&nbsp;|&nbsp;&nbsp; Space &mdash; Pause &nbsp;&nbsp;|&nbsp;&nbsp; First to 10 wins</span>
  <span class="touch">Touch left half &mdash; Left Paddle &nbsp;&nbsp;|&nbsp;&nbsp; Touch right half &mdash; Right Paddle &nbsp;&nbsp;|&nbsp;&nbsp; First to 10 wins</span>
</div>
<script>
const canvas = document.getElementById('pong');
const ctx = canvas.getContext('2d');

// ---------- game constants ----------
const WINNING_SCORE = 10;
const PADDLE_W = 12;
const PADDLE_H = 90;
const BALL_SIZE = 10;
const PADDLE_SPEED = 6;
const BALL_SPEED_INITIAL = 5;
const BALL_SPEED_INCREMENT = 0.3;
const NET_DASH = 10;
const PACMAN_SIZE = 30;
const PACMAN_SPEED = 3;
const PACMAN_SPAWN_MIN_BOUNCES = 5;

// ---------- state ----------
let paused = false;
let gameOver = false;
let winner = '';
let bounceCount = 0;

const pacman = {
  active: false,
  x: 0, y: 0,
  mouthAngle: 0,
  mouthDir: 1,
  eating: false,
  eatTimer: 0,
  facingAngle: 0,
};

const player1 = { x: 20, y: canvas.height / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H, score: 0, dy: 0 };
const player2 = { x: canvas.width - 20 - PADDLE_W, y: canvas.height / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H, score: 0, dy: 0 };

const ball = { x: 0, y: 0, vx: 0, vy: 0, size: BALL_SIZE, speed: BALL_SPEED_INITIAL };

function resetBall(direction) {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.speed = BALL_SPEED_INITIAL;
  const angle = (Math.random() * Math.PI / 4) - Math.PI / 8; // -22.5° to 22.5°
  ball.vx = direction * ball.speed * Math.cos(angle);
  ball.vy = ball.speed * Math.sin(angle);
  bounceCount = 0;
  pacman.active = false;
  pacman.eating = false;
}

function spawnPacman() {
  // spawn from a random edge
  const edge = Math.floor(Math.random() * 4);
  if (edge === 0) { pacman.x = -PACMAN_SIZE; pacman.y = Math.random() * canvas.height; }
  else if (edge === 1) { pacman.x = canvas.width + PACMAN_SIZE; pacman.y = Math.random() * canvas.height; }
  else if (edge === 2) { pacman.x = Math.random() * canvas.width; pacman.y = -PACMAN_SIZE; }
  else { pacman.x = Math.random() * canvas.width; pacman.y = canvas.height + PACMAN_SIZE; }
  pacman.active = true;
  pacman.eating = false;
  pacman.eatTimer = 0;
  pacman.mouthAngle = 0.3;
}

resetBall(Math.random() < 0.5 ? 1 : -1);

// ---------- input ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault();
    if (gameOver) {
      restart();
    } else {
      paused = !paused;
    }
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function restart() {
  player1.score = 0;
  player2.score = 0;
  gameOver = false;
  winner = '';
  ball.size = BALL_SIZE;
  pacman.active = false;
  pacman.eating = false;
  resetBall(Math.random() < 0.5 ? 1 : -1);
}

// ---------- touch input ----------
let p1TouchY = null;
let p2TouchY = null;
const touchSides = {}; // identifier -> 'left' | 'right'

function getTouchPos(touch) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) * (canvas.width / rect.width),
    y: (touch.clientY - rect.top) * (canvas.height / rect.height),
  };
}

function getTouchCanvasY(touch) {
  const rect = canvas.getBoundingClientRect();
  return (touch.clientY - rect.top) * (canvas.height / rect.height);
}

document.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameOver) { restart(); return; }
  for (const t of e.changedTouches) {
    const side = t.clientX < window.innerWidth / 2 ? 'left' : 'right';
    touchSides[t.identifier] = side;
    if (side === 'left') p1TouchY = getTouchCanvasY(t);
    else p2TouchY = getTouchCanvasY(t);
  }
}, { passive: false });

document.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const side = touchSides[t.identifier];
    if (side === 'left') p1TouchY = getTouchCanvasY(t);
    else if (side === 'right') p2TouchY = getTouchCanvasY(t);
  }
}, { passive: false });

document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    const side = touchSides[t.identifier];
    if (side === 'left') p1TouchY = null;
    else if (side === 'right') p2TouchY = null;
    delete touchSides[t.identifier];
  }
});

// ---------- update ----------
function update(dt) {
  if (paused || gameOver) return;

  // paddle movement — keyboard
  player1.dy = 0;
  if (keys['w'] || keys['W']) player1.dy = -PADDLE_SPEED;
  if (keys['s'] || keys['S']) player1.dy = PADDLE_SPEED;

  player2.dy = 0;
  if (keys['ArrowUp']) player2.dy = -PADDLE_SPEED;
  if (keys['ArrowDown']) player2.dy = PADDLE_SPEED;

  player1.y = Math.max(0, Math.min(canvas.height - player1.h, player1.y + player1.dy * dt));
  player2.y = Math.max(0, Math.min(canvas.height - player2.h, player2.y + player2.dy * dt));

  // paddle movement — touch (overrides keyboard if finger is down)
  if (p1TouchY !== null)
    player1.y = Math.max(0, Math.min(canvas.height - player1.h, p1TouchY - player1.h / 2));
  if (p2TouchY !== null)
    player2.y = Math.max(0, Math.min(canvas.height - player2.h, p2TouchY - player2.h / 2));

  // ball movement
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // top/bottom bounce
  if (ball.y - ball.size / 2 <= 0) {
    ball.y = ball.size / 2;
    ball.vy = Math.abs(ball.vy);
    bounceCount++;
  }
  if (ball.y + ball.size / 2 >= canvas.height) {
    ball.y = canvas.height - ball.size / 2;
    ball.vy = -Math.abs(ball.vy);
    bounceCount++;
  }

  // paddle collision helper
  function collidePaddle(paddle) {
    return (
      ball.x - ball.size / 2 < paddle.x + paddle.w &&
      ball.x + ball.size / 2 > paddle.x &&
      ball.y + ball.size / 2 > paddle.y &&
      ball.y - ball.size / 2 < paddle.y + paddle.h
    );
  }

  // left paddle
  if (ball.vx < 0 && collidePaddle(player1)) {
    ball.x = player1.x + player1.w + ball.size / 2;
    let hitPos = (ball.y - (player1.y + player1.h / 2)) / (player1.h / 2); // -1 to 1
    hitPos = Math.max(-1, Math.min(1, hitPos));
    ball.speed += BALL_SPEED_INCREMENT;
    const angle = hitPos * (Math.PI / 3); // max 60°
    ball.vx = ball.speed * Math.cos(angle);
    ball.vy = ball.speed * Math.sin(angle);
    bounceCount++;
  }

  // right paddle
  if (ball.vx > 0 && collidePaddle(player2)) {
    ball.x = player2.x - ball.size / 2;
    let hitPos = (ball.y - (player2.y + player2.h / 2)) / (player2.h / 2);
    hitPos = Math.max(-1, Math.min(1, hitPos));
    ball.speed += BALL_SPEED_INCREMENT;
    const angle = hitPos * (Math.PI / 3);
    ball.vx = -ball.speed * Math.cos(angle);
    ball.vy = ball.speed * Math.sin(angle);
    bounceCount++;
  }

  // pac-man spawn check — after enough bounces, random chance each frame
  if (!pacman.active && !pacman.eating && bounceCount >= PACMAN_SPAWN_MIN_BOUNCES) {
    if (Math.random() < 0.01) spawnPacman();
  }

  // pac-man update
  if (pacman.active && !pacman.eating) {
    const dx = ball.x - pacman.x;
    const dy = ball.y - pacman.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    pacman.facingAngle = Math.atan2(dy, dx);

    if (dist < PACMAN_SIZE / 2) {
      // eat the ball
      pacman.eating = true;
      pacman.eatTimer = 90; // frames of chomp animation
    } else {
      pacman.x += (dx / dist) * PACMAN_SPEED * dt;
      pacman.y += (dy / dist) * PACMAN_SPEED * dt;
    }

    // animate mouth
    pacman.mouthAngle += 0.05 * pacman.mouthDir * dt;
    if (pacman.mouthAngle > 0.4) pacman.mouthDir = -1;
    if (pacman.mouthAngle < 0.05) pacman.mouthDir = 1;
  }

  if (pacman.eating) {
    // lock ball inside pac-man's mouth
    ball.vx = 0;
    ball.vy = 0;
    ball.x = pacman.x;
    ball.y = pacman.y;

    // chomp animation
    pacman.mouthAngle += 0.08 * pacman.mouthDir * dt;
    if (pacman.mouthAngle > 0.45) pacman.mouthDir = -1;
    if (pacman.mouthAngle < 0.02) pacman.mouthDir = 1;

    // shrink ball as it's eaten
    ball.size = Math.max(0, ball.size - 0.15 * dt);

    pacman.eatTimer -= dt;
    if (pacman.eatTimer <= 0) {
      gameOver = true;
      winner = 'PAC-MAN';
      ball.size = 0;
    }
  }

  // scoring
  if (ball.x + ball.size / 2 < 0) {
    player2.score++;
    if (player2.score >= WINNING_SCORE) { gameOver = true; winner = 'Player 2'; }
    else resetBall(1);
  }
  if (ball.x - ball.size / 2 > canvas.width) {
    player1.score++;
    if (player1.score >= WINNING_SCORE) { gameOver = true; winner = 'Player 1'; }
    else resetBall(-1);
  }
}

// ---------- draw ----------
function draw() {
  // background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // center net
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.setLineDash([NET_DASH, NET_DASH]);
  ctx.beginPath();
  ctx.moveTo(canvas.width / 2, 0);
  ctx.lineTo(canvas.width / 2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);

  // scores
  ctx.fillStyle = '#fff';
  ctx.font = '48px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(player1.score, canvas.width / 4, 60);
  ctx.fillText(player2.score, (canvas.width / 4) * 3, 60);

  // paddles
  ctx.fillStyle = '#fff';
  ctx.fillRect(player1.x, player1.y, player1.w, player1.h);
  ctx.fillRect(player2.x, player2.y, player2.w, player2.h);

  // ball (only draw if it has size)
  if (ball.size > 0) {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.size / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // pac-man
  if (pacman.active || pacman.eating) {
    ctx.fillStyle = '#FFE000';
    ctx.beginPath();
    const mouth = pacman.mouthAngle;
    ctx.arc(pacman.x, pacman.y, PACMAN_SIZE, pacman.facingAngle + mouth, pacman.facingAngle + Math.PI * 2 - mouth);
    ctx.lineTo(pacman.x, pacman.y);
    ctx.closePath();
    ctx.fill();

    // eye
    const eyeX = pacman.x + Math.cos(pacman.facingAngle - 0.5) * PACMAN_SIZE * 0.45;
    const eyeY = pacman.y + Math.sin(pacman.facingAngle - 0.5) * PACMAN_SIZE * 0.45;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // overlays
  if (paused && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '36px Courier New';
    ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (winner === 'PAC-MAN') {
      ctx.fillStyle = '#FFE000';
      ctx.font = '42px Courier New';
      ctx.fillText('PAC-MAN ate the ball!', canvas.width / 2, canvas.height / 2 - 20);
    } else {
      ctx.fillStyle = '#fff';
      ctx.font = '42px Courier New';
      ctx.fillText(winner + ' Wins!', canvas.width / 2, canvas.height / 2 - 20);
    }
    ctx.fillStyle = '#fff';
    ctx.font = '20px Courier New';
    ctx.fillText('Press Space to restart', canvas.width / 2, canvas.height / 2 + 30);
  }
}

// ---------- loop ----------
let lastTime = 0;
function gameLoop(timestamp) {
  // dt normalised to 60fps — caps at 3 so a backgrounded tab doesn't lurch
  const dt = lastTime ? Math.min((timestamp - lastTime) / (1000 / 60), 3) : 1;
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
